<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONLINE / NOT PRESENT</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    overflow: hidden;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.title {
    font-size: 28px;
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeIn 3s forwards;
}

.subtitle {
    margin-top: 10px;
    opacity: 0.5;
    font-size: 14px;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

.glow {
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: white;
    border: none;
    cursor: pointer;
}

#noise {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://grainy-gradients.vercel.app/noise.svg');
    opacity: 0.05;
    pointer-events: none;
}
</style>
</head>

<body>

<div id="noise"></div>

<div class="center">
    <div class="title glow">ONLINE / NOT PRESENT</div>
    <div class="subtitle">你在線，但你不在這裡</div>
    <button onclick="enter()">進入展覽</button>
</div>

<script>
function enter() {
    document.body.style.transition = "2s";
    document.body.style.opacity = "0";
    setTimeout(() => {
        window.location.href = "social.html";
    }, 2000);
}
</script>

</body>
</html>
